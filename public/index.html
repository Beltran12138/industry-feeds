<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3行业动态</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#fcfcfd;--bg-card:white;--bg-sidebar:#fcfcfd;--bg-right:white;--bg-input:#f8fafc;--border:#edf2f7;--border-light:#f1f5f9;--text:#1a1a1b;--text-secondary:#64748b;--text-muted:#94a3b8;--nav-active-bg:#f1f5f9;--nav-active-text:#0f172a;--depth-shadow:0 1px 3px rgba(0,0,0,.02),0 4px 12px rgba(0,0,0,.03);--depth-hover-shadow:0 4px 20px rgba(0,0,0,.08);--skeleton-from:#f1f5f9;--skeleton-via:#f8fafc}
    .dark{--bg:#0f172a;--bg-card:#1e293b;--bg-sidebar:#0f172a;--bg-right:#1e293b;--bg-input:#1e293b;--border:#334155;--border-light:#1e293b;--text:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--nav-active-bg:#1e293b;--nav-active-text:#f1f5f9;--depth-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.3);--depth-hover-shadow:0 4px 20px rgba(0,0,0,.4);--skeleton-from:#1e293b;--skeleton-via:#334155}
    body{background-color:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;transition:background-color .3s,color .3s}
    .scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .depth-card{background:var(--bg-card);border:1px solid var(--border);box-shadow:var(--depth-shadow);transition:all .2s cubic-bezier(.4,0,.2,1)}
    .depth-card:hover{box-shadow:var(--depth-hover-shadow);transform:translateY(-1px)}
    .feed-read{opacity:.55;filter:contrast(.9) grayscale(.3)}
    .nav-active{background-color:var(--nav-active-bg);color:var(--nav-active-text) !important;font-weight:600}
    @keyframes skeleton-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skeleton{background:linear-gradient(90deg,var(--skeleton-from) 25%,var(--skeleton-via) 50%,var(--skeleton-from) 75%);background-size:200% 100%;animation:skeleton-shimmer 1.5s infinite;border-radius:8px}
    .badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.025em}
    .urgent-border{border-left:4px solid #ef4444 !important}
    .score-critical{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-weight:800}
    .score-high{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;font-weight:700}
    .score-medium{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0;font-weight:600}
    .dark .score-critical{background:#451a03;color:#fbbf24;border-color:#92400e}
    .dark .score-high{background:#431407;color:#fb923c;border-color:#9a3412}
    .dark .score-medium{background:#1e293b;color:#94a3b8;border-color:#334155}
    #mobile-menu{display:none}.mobile-menu-open #mobile-menu{display:flex}
    mark{background:#fef08a;border-radius:2px;padding:0 2px}
    .dark mark{background:#854d0e;color:#fef08a}
    #chart-panel{display:none}.chart-mode #chart-panel{display:block}.chart-mode #feed-panel{display:none}
    .view-tab-active{background:white;color:#0f172a;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .dark .view-tab-active{background:var(--bg-card);color:var(--text)}
    .keyboard-focus{outline:2px solid #3b82f6;outline-offset:2px;box-shadow:0 0 0 4px rgba(59,130,246,.15)}
    /* Dark mode overrides for Tailwind classes used inline */
    .dark .bg-white{background:var(--bg-card) !important}
    .dark .bg-slate-50,.dark .bg-\\[\\#fcfcfd\\]{background:var(--bg) !important}
    .dark .bg-slate-100{background:#334155 !important}
    .dark .border-slate-200,.dark .border-slate-100,.dark .border-slate-150{border-color:var(--border) !important}
    .dark .text-slate-900,.dark .text-slate-800,.dark .text-slate-700{color:#e2e8f0 !important}
    .dark .text-slate-600{color:#cbd5e1 !important}
    .dark .text-slate-500{color:#94a3b8 !important}
    .dark .text-slate-400{color:#64748b !important}
    .dark .text-slate-300{color:#475569 !important}
    .dark .hover\\:bg-slate-100:hover{background:#334155 !important}
    .dark .hover\\:bg-slate-50:hover{background:#1e293b !important}
    .dark .bg-slate-200{background:#475569 !important}
    .dark .hover\\:bg-slate-200:hover{background:#475569 !important}
    .dark .bg-slate-300{background:#64748b !important}
    .dark .bg-blue-50{background:#1e3a5f !important}
    .dark .text-blue-600,.dark .text-blue-500{color:#60a5fa !important}
    .dark .bg-red-50{background:#450a0a !important}
    .dark .bg-emerald-50{background:#052e16 !important}
    .dark .bg-indigo-50{background:#1e1b4b !important}
    /* Export modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center}
    .modal-content{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  </style>
</head>
<body>
<div id="root"></div>

<!-- 前端组件库（抽离的 React 组件） -->
<script src="/components.js"></script>
<script src="/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then((reg) => console.log('SW registered'))
      .catch((err) => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
