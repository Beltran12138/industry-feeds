name: Industry Feeds Scraper (High-Freq)

on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium and Tor
        run: |
          sudo apt-get update && sudo apt-get install -y google-chrome-stable tor
          sudo service tor start
          echo "Tor started (circuits establish during scraping)"

      - name: Run Scrapers (High-Freq)
        run: npm run scrape:high
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: true
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          DASHBOARD_URL: https://alpha-radar-eight.vercel.app
