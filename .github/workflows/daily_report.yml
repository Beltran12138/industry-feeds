name: Daily Report

on:
  schedule:
    # 每天北京时间 18:00 (= UTC 10:00)
    # 注意：GitHub Actions cron 可能延迟 5-30 分钟
    - cron: '0 10 * * *'
  workflow_dispatch: # 手动触发

# 防止多个日报实例并发运行
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check runtime versions
        run: |
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          node -e "console.log('NMV:', process.versions.modules)"

      - name: Install dependencies
        run: npm ci

      - name: Run Daily Report
        id: report
        run: node run_daily_report.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: 'true'
          DEBUG: 'true'

      - name: Retry on failure
        if: failure()
        run: |
          echo "[Retry] First attempt failed, retrying in 30s..."
          sleep 30
          node run_daily_report.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: 'true'
          DEBUG: 'true'
