name: Industry Feeds Scraper (Low-Freq)

on:
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  workflow_dispatch: # Manual trigger

# Prevent overlapping runs
concurrency:
  group: scrape-low
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: google-chrome-stable tor
          version: 1.0

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Start Tor
        run: |
          sudo service tor start
          echo "Tor started (circuits establish during scraping)"

      - name: Run Scrapers (Low-Freq)
        run: npm run scrape:low
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          USE_SUPABASE: true
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          DASHBOARD_URL: https://alpha-radar-eight.vercel.app
