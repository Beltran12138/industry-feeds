name: Industry Feeds Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium and Tor
        run: |
          sudo apt-get update && sudo apt-get install -y google-chrome-stable tor
          sudo service tor start
          # Pre-warm Tor circuits before running scrapers (typically takes 30-60s)
          curl --silent --max-time 90 --socks5 127.0.0.1:9050 https://check.torproject.org/api/ip || true
          echo "Tor ready"

      - name: Run Scrapers
        run: node test_scrape.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          USE_SUPABASE: true
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
